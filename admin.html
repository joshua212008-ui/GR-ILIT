<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRΛILIT - 管理画面</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f4f4; color: #333; font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1, h2 { color: #111; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; background: #111; color: #fff; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; font-weight: bold; }
        .btn:hover { background: #333; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #2ecc71; }
        .btn-success:hover { background: #27ae60; }
        
        .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .product-card { border: 1px solid #ddd; padding: 15px; border-radius: 6px; position: relative; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .product-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .product-card .actions { display: flex; gap: 10px; margin-top: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        .form-row { display: flex; gap: 15px; }
        .form-row > .form-group { flex: 1; }
        
        #product-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; }
        .modal-content { background: #fff; max-width: 600px; margin: 40px auto; padding: 30px; border-radius: 8px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }
        
        .tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { border-bottom-color: #111; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .save-instruction { background: #e8f4fd; padding: 15px; border-left: 4px solid #3498db; margin-bottom: 20px; border-radius: 4px; }
        .link-chip { display: inline-block; padding: 2px 8px; background: #34495e; color: #fff; border-radius: 12px; font-size: 0.8rem; text-decoration: none; margin-right: 5px; }
        .link-chip:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fa-solid fa-gear"></i> GRΛILIT 管理画面</h1>
            <div>
                <a href="index.html" class="btn" style="background: #7f8c8d; margin-right: 10px;">ショップに戻る</a>
                <button id="download-btn" class="btn btn-success"><i class="fa-solid fa-download"></i> 設定を保存 (data.jsをダウンロード)</button>
            </div>
        </div>

        <div class="save-instruction">
            <strong><i class="fa-solid fa-circle-info"></i> 保存の手順:</strong><br>
            「設定を保存」ボタンを押すと、新しい <code>data.js</code> ファイルがダウンロードされます。<br>
            ダウンロードしたファイルを <code>js</code> フォルダの中にある元の <code>data.js</code> と置き換えるだけで更新完了です！
        </div>

        <div class="admin-header" style="border:none; padding:0; margin-top: 40px;">
            <h2>商品一覧</h2>
            <button id="add-product-btn" class="btn"><i class="fa-solid fa-plus"></i> 新しい商品を追加</button>
        </div>

        <div id="admin-product-list" class="product-list">
            <!-- 商品がここに表示されます -->
        </div>
    </div>

    <!-- 商品編集/追加モーダル -->
    <div id="product-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">商品の追加</h2>
            
            <form id="product-form">
                <input type="hidden" id="edit-index" value="-1">
                
                <div class="form-row">
                    <div class="form-group">
                        <label>商品ID (必須・重複不可)</label>
                        <input type="text" id="p-id" required placeholder="例: v-003">
                    </div>
                    <div class="form-group">
                        <label>カテゴリー</label>
                        <select id="p-category" required>
                            <option value="All">All (すべて)</option>
                            <option value="Cap">Cap (帽子)</option>
                            <option value="Outer">Outer (アウター)</option>
                            <option value="Top">Top (トップス)</option>
                            <option value="Pants">Pants (パンツ)</option>
                            <option value="Shoes">Shoes (靴)</option>
                            <option value="Accessory">Accessory (アクセサリー)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>価格 (円・カンマなし)</label>
                        <input type="number" id="p-price" required placeholder="例: 15000">
                    </div>
                    <div class="form-group">
                        <label>Stripe Checkout Link</label>
                        <input type="url" id="p-stripe-link" placeholder="例: https://buy.stripe.com/xxxxx">
                    </div>
                    <div class="form-group">
                        <label>Stripe Product ID (自動在庫管理用)</label>
                        <input type="text" id="p-stripe-id" placeholder="例: prod_Pxxxxxxx">
                        <small style="color: #666;">※Stripeの商品詳細ページにある「ID」を入力してください</small>
                    </div>
                    <div class="form-group">
                        <label>在庫数 (手動設定)</label>
                        <input type="number" id="p-inventory" required placeholder="例: 10" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>画像URL (またはファイルパス)</label>
                    <input type="text" id="p-image" required placeholder="assets/images/... または https://...">
                </div>

                <div class="form-group">
                    <label>サイズ展開 (カンマ区切り)</label>
                    <input type="text" id="p-sizes" placeholder="例: S, M, L, XL" required>
                </div>

                <div class="tabs">
                    <div class="tab active" data-lang="ja">日本語</div>
                    <div class="tab" data-lang="en">English</div>
                    <div class="tab" data-lang="ko">한국어</div>
                </div>

                <div class="tab-content active" id="tab-ja">
                    <div class="form-group">
                        <label>商品名 (日本語)</label>
                        <input type="text" id="p-name-ja" required>
                    </div>
                    <div class="form-group">
                        <label>商品説明 (日本語)</label>
                        <textarea id="p-desc-ja" rows="4" required></textarea>
                    </div>
                </div>

                <div class="tab-content" id="tab-en">
                    <div class="form-group">
                        <label>商品名 (英語)</label>
                        <input type="text" id="p-name-en" required>
                    </div>
                    <div class="form-group">
                        <label>商品説明 (英語)</label>
                        <textarea id="p-desc-en" rows="4" required></textarea>
                    </div>
                </div>

                <div class="tab-content" id="tab-ko">
                    <div class="form-group">
                        <label>商品名 (韓国語)</label>
                        <input type="text" id="p-name-ko" required>
                    </div>
                    <div class="form-group">
                        <label>商品説明 (韓国語)</label>
                        <textarea id="p-desc-ko" rows="4" required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 20px; padding: 15px; font-size: 1.1rem;">保存する (一覧に反映)</button>
            </form>
        </div>
    </div>

    <!-- 既存のデータを読み込む -->
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
